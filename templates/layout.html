<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Men & Menstruation{% endblock %}</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&family=Luckiest+Guy&display=swap" rel="stylesheet">

    <!-- Bootstrap for Responsiveness -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <!-- Tailwind CSS CDN for utility classes -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ef4136;
            font-family: 'Luckiest Guy', cursive;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .logo {
            position: absolute;
            top: 20px;
            left: 30px;
            font-size: 20px;
            font-family: 'Rock Salt', cursive;
        }

        .logo span {
            font-family: 'Luckiest Guy', cursive;
            font-size: 26px;
            letter-spacing: 1px;
            display: block;
        }

        .navbar {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 12px;
        }

        .navbar a {
            background-color: white;
            color: #ef4136;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            padding: 6px 14px;
            border: 2px solid #ef4136;
            transition: all 0.3s ease;
            font-family: 'Luckiest Guy', cursive;
            border-radius: 4px;
        }

        .navbar a:hover {
            background-color: #ef4136;
            color: white;
        }

        .content {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            padding-top: 140px;
            padding-bottom: 50px;
            font-size: 1rem;
            text-align: center;
            line-height: 1.6;
        }

        .footer {
            background-color: white;
            color: #ef4136;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1rem;
            padding: 12px;
            text-align: center;
        }

        body.contact-page .content,
        body.phases-page .content {
            font-size: 1rem;
            padding: 50px 20px 10px;
            line-height: 1.6;
            text-align: left;
            max-width: 700px;
            margin: 0 auto;
        }

        body.home-page .content {
            font-size: 3.5rem;
            padding-top: 160px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .logo span {
                font-size: 20px;
            }
            .navbar {
                flex-direction: column;
                top: 70px;
                right: 10px;
            }
            .navbar a {
                font-size: 11px;
                margin: 4px 0;
            }
            .content {
                font-size: 1rem;
                padding-top: 110px;
                padding-bottom: 30px;
            }

            body.contact-page .content,
            body.phases-page .content {
                font-size: 0.95rem;
                padding: 40px 15px 10px;
            }

            body.home-page .content {
                font-size: 2.5rem;
                padding-top: 120px;
            }
        }
    </style>
</head>
<body class="{% block body_class %}{% endblock %}">
    <div class="logo">
        <span>Men & Menstruation</span>
    </div>
    <div class="navbar">
        <a href="{{ url_for('home') }}">Home</a>
        <a href="{{ url_for('phases') }}">Phases</a>
        <a href="{{ url_for('contact') }}">Contact</a>
    </div>

    <!-- Page Content -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>Love, Learn, Support.</p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
